name: CI
on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref so only the latest run proceeds. The
# event name is part of the key so a PR push and a push to main stay in
# separate groups and never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # standardrb, typecheck, minitest, commitlint, and data validation are independent and each
  # finishes in well under a second — the cost is the repeated checkout + Ruby/
  # Node setup. Run them as parallel steps in one job so that setup happens once
  # instead of five times. See .ai/2026-06-25-parallel-steps.md.
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so commitlint can see the full commit range.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - parallel:
          - name: standardrb
            run: bundle exec standardrb
          - name: typecheck
            run: pnpm run typecheck
          - name: minitest
            run: bundle exec rake test
          - name: commitlint
            run: |
              if [ "${{ github.event_name }}" = "pull_request" ]; then
                pnpm exec commitlint \
                  --from "${{ github.event.pull_request.base.sha }}" \
                  --to "${{ github.event.pull_request.head.sha }}" \
                  --verbose
              else
                pnpm exec commitlint --last --verbose
              fi
          - name: data validation
            run: bundle exec rake data:validate

  build:
    name: production build
    runs-on: ubuntu-latest
    outputs:
      built: ${{ steps.mark.outputs.built }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - env:
          BRIDGETOWN_ENV: production
          TORCHLIGHT_TOKEN: ${{ secrets.TORCHLIGHT_TOKEN }}
        run: bin/bridgetown deploy
      - id: mark
        run: echo "built=true" >> "$GITHUB_OUTPUT"
      - name: Upload build output
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/upload-artifact@v7
        with:
          name: site-output
          path: output
          retention-days: 1
          include-hidden-files: true

  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    needs: build
    # The build job only uploads site-output on push or same-repo PRs, so gate
    # Lighthouse the same way.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    env:
      LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          ruby: "false"
      - uses: actions/download-artifact@v8
        with:
          name: site-output
          path: output
      # Lighthouse dominates this job's wall-clock. Instead of collecting all
      # seven URLs serially in one `lhci autorun`, split them into three shards
      # that run as parallel steps so the Chrome runs overlap. Each `autorun`
      # auto-assigns a free port and posts per-URL GitHub statuses (context
      # `lhci/url<path>`), so shards never collide on ports or clobber each
      # other's statuses. `--collect.url` overrides the list in lighthouserc.cjs
      # — keep the union of these shards in sync with that file.
      - parallel:
          - name: Lighthouse (home, posts, about)
            run: >-
              pnpm exec lhci autorun --collect.url=http://localhost/ --collect.url=http://localhost/posts/ --collect.url=http://localhost/about/
          - name: Lighthouse (projects, speaking)
            run: >-
              pnpm exec lhci autorun --collect.url=http://localhost/projects/ --collect.url=http://localhost/speaking/
          - name: Lighthouse (post, tag)
            run: >-
              pnpm exec lhci autorun --collect.url=http://localhost/p/kill-process-on-port/ --collect.url=http://localhost/tag/rails/

  deploy:
    name: deploy to cloudflare
    runs-on: ubuntu-latest
    needs: [checks, build, lighthouse]
    # Dependabot PRs run with a restricted token and no access to Actions
    # secrets, so the Cloudflare preview deploy can't authenticate. Skip it for
    # Dependabot (lint/test/build still validate the bump), just like forks.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          ruby: "false"
      - uses: actions/download-artifact@v8
        with:
          name: site-output
          path: output

      - name: Deploy to production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v4
        # Authenticate with the Global API Key + email (read from env by
        # wrangler) instead of a scoped apiToken input.
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Compute preview alias
        if: github.event_name == 'pull_request'
        id: alias
        run: |
          raw="pr-${{ github.event.pull_request.number }}-${{ github.head_ref }}"
          slug=$(printf '%s' "$raw" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+|-+$//g' \
            | cut -c1-40 \
            | sed -E 's/-+$//')
          echo "alias=$slug" >> "$GITHUB_OUTPUT"

      # OG image meta tags are absolute (https://andrewm.codes/og/<slug>.png)
      # because Util::Seo runs them through helpers.absolute_url, which uses
      # site.metadata.url. Pre-merge, prod doesn't have the PNGs yet, so
      # social validators 404 when they scrape a preview URL. Rewrite just
      # the og/twitter image hosts to point at this preview deploy so it
      # self-validates. Canonical / og:url intentionally stay on prod.
      - name: Rewrite OG image URLs for preview
        if: github.event_name == 'pull_request'
        env:
          # Cloudflare account-level workers.dev subdomain. There's no clean
          # way to read this from wrangler config or env, so document and
          # hardcode (Dash → Workers & Pages → Settings → Subdomain).
          CF_WORKERS_SUBDOMAIN: andrewmcodes
        run: |
          worker_name=$(jq -r '.name' wrangler.jsonc)
          preview_host="${{ steps.alias.outputs.alias }}-${worker_name}.${CF_WORKERS_SUBDOMAIN}.workers.dev"
          echo "Rewriting og:image hosts → https://${preview_host}/og/"
          find output -name '*.html' -print0 \
            | xargs -0 sed -i "s#https://andrewm.codes/og/#https://${preview_host}/og/#g"

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        id: preview
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias ${{ steps.alias.outputs.alias }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_OUTPUT: ${{ steps.preview.outputs.command-output }}
          PREVIEW_STDERR: ${{ steps.preview.outputs.command-stderr }}
        run: |
          # Wrangler prints two URLs — prefer the human-readable alias.
          #   Version Preview URL:       https://<hash>-<worker>.<account>.workers.dev
          #   Version Preview Alias URL: https://<alias>-<worker>.<account>.workers.dev
          combined=$(printf '%s\n%s\n' "$PREVIEW_OUTPUT" "$PREVIEW_STDERR")
          url=$(printf '%s\n' "$combined" \
            | sed -nE 's#.*Version Preview Alias URL:[[:space:]]+(https://[A-Za-z0-9.-]+\.workers\.dev).*#\1#p' \
            | head -1)
          if [ -z "$url" ]; then
            url=$(printf '%s\n' "$combined" \
              | sed -nE 's#.*Version Preview URL:[[:space:]]+(https://[A-Za-z0-9.-]+\.workers\.dev).*#\1#p' \
              | head -1)
          fi
          body="Preview: ${url:-(URL could not be extracted from wrangler output)}"
          gh pr comment "$PR_NUMBER" --body "$body" --edit-last 2>/dev/null \
            || gh pr comment "$PR_NUMBER" --body "$body"
