name: "Copilot Setup Steps"

# Automatically run setup changes for validation, and allow manual testing in
# the Actions UI.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # This job name is required for Copilot cloud agent to pick up setup steps.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Install project toolchains and dependencies
        uses: ./.github/actions/setup
