name: Setup
description: >
  Ruby + Node + pnpm setup with caching shared by all CI jobs. Pass `node: false` to skip the Node/pnpm half (e.g. the lint job) or `ruby: false` to skip the Ruby half (e.g. the deploy job).

inputs:
  ruby-version:
    description: Ruby version
    required: false
    default: "4.0.3"
  node-version:
    description: Node version
    required: false
    default: "22"
  ruby:
    description: Set to "false" to skip Ruby/bundler install
    required: false
    default: "true"
  node:
    description: Set to "false" to skip Node/pnpm install
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - if: inputs.ruby != 'false'
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ inputs.ruby-version }}
        bundler-cache: true

    - if: inputs.node != 'false'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - if: inputs.node != 'false'
      shell: bash
      run: corepack enable

    - if: inputs.node != 'false'
      uses: actions/cache@v5
      with:
        path: ~/.local/share/pnpm/store
        key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-

    - if: inputs.node != 'false'
      shell: bash
      run: pnpm install --frozen-lockfile
