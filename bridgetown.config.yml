url: "https://andrewm.codes"
permalink: "/:path.*/"

# Disable Rouge so Torchlight does the highlighting. Bridgetown coerces
# nil/false back to "rouge" (`||= config["highlighter"] || "rouge"`), so
# we pass an empty string — kramdown sees no registered highlighter and
# emits plain `<pre><code class="language-X">...</code></pre>`.
highlighter: ""

collections:
  pages:
    output: true
    permalink: "/:slug/"
  posts:
    output: true
    permalink: "/p/:slug/"
    sort_by: date
    sort_direction: descending
  projects:
    output: false
  cfps:
    output: true
    permalink: "/cfps/:slug/"
    sort_by: date
    sort_direction: descending
  # Component stories: rendered to /stories/<name>/ in dev/test so Storybook can
  # consume the real component HTML (see .storybook/ + stories/*.stories.js).
  # Builders::Stories strips them from production output so they never ship.
  stories:
    output: true
    permalink: "/stories/:slug/"

defaults:
  - scope: { path: "" }
    values:
      kind: page
  - scope: { path: "", type: posts }
    values:
      layout: post
      kind: post
  - scope: { path: "", type: pages }
    values:
      layout: page
  - scope: { path: "", type: cfps }
    values:
      layout: post
      kind: cfp

feed:
  categories: [blog, tutorials, snippets]
