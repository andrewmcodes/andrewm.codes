allowBuilds:
  "@resvg/resvg-js": true
  esbuild: true
  # miniflare (wrangler) pulls sharp in, but this site uses @resvg/resvg-js +
  # satori for images and never uses sharp. Skip its native build — the source
  # build needs libvips/node-addon-api and fails, and the prebuilt @img binary
  # is installed for runtime regardless.
  sharp: false
  workerd: true
# Keep supply-chain age checks enabled, but avoid CI failures on freshly
# published Dependabot bumps by reducing the default 24h window to 6h.
minimumReleaseAge: 0.25
